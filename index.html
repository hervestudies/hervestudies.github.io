<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herve Ahishakiye</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .profilepic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      border: 4px solid #4facfe;
    }

    h2 {
      margin-bottom: 10px;
      font-weight: 700;
    }

    p {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 12px;
      border-radius: 30px;
      background: #111;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #4facfe;
      transform: scale(1.05);
    }

    footer {
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="networkengineer.jpg" class="profilepic" alt="Profile Picture">

    <h2>Herve Ahishakiye</h2>
    <p>
      Undergraduate student specializing in <b>Networking Engineering</b><br>
      and <b>Web Development</b>.
    </p>

    <a href="https://www.instagram.com/herve/" target="_blank" class="btn">Instagram</a>
    <a href="https://www.linkedin.com/in/herveahishakiye/" target="_blank" class="btn">LinkedIn</a>
    <a href="https://github.com/herveahishakiye" target="_blank" class="btn">GitHub</a>

    <footer>© 2026 Herve</footer>
  </div>
</body>
</html>
