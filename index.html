<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herve Ahishakiye</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      padding: 50px;
      border-radius: 25px;
      text-align: center;
      width: 95%;
      max-width: 500px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    .profilepic {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 5px solid #4facfe;
    }

    h2 {
      margin-bottom: 15px;
      font-weight: 700;
      font-size: 28px;
    }

    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 15px;
      border-radius: 35px;
      background: #111;
      color: white;
      text-decoration: none;
      font-size: 16px;
      width: 80%;
      transition: 0.3s;
    }

    .btn:hover {
      background: #4facfe;
      transform: scale(1.08);
    }

    footer {
      margin-top: 25px;
      font-size: 14px;
      color: #888;
    }

    /* Make it even bigger on large screens */
    @media (min-width: 768px) {
      .card {
        max-width: 600px;
        padding: 60px;
      }

      h2 {
        font-size: 32px;
      }

      p {
        font-size: 18px;
      }

      .btn {
        font-size: 18px;
        padding: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="networkengineer.jpg" class="profilepic" alt="Profile Picture">

    <h2>Herve Ahishakiye</h2>
    <p>
      Hello! I am an undergraduate student specializing in <b>Networking Engineering</b><br>
      and <b>Web Development</b>. I am passionate about building modern websites
      and managing network systems.
    </p>

    <a href="https://www.instagram.com/herve/" target="_blank" class="btn">Instagram</a>
    <a href="https://www.linkedin.com/in/herveahishakiye/" target="_blank" class="btn">LinkedIn</a>
    <a href="https://github.com/herveahishakiye" target="_blank" class="btn">GitHub</a>

    <footer>© 2026 Herve Ahishakiye</footer>
  </div>
</body>
</html>
